name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env from secrets
        run: |
          echo "VITE_BRIDGE_URL=${{ secrets.VITE_BRIDGE_URL }}" >> .env
          echo "VITE_SLIDES_PRESENTATION_ID=${{ secrets.VITE_SLIDES_PRESENTATION_ID }}" >> .env
          echo "VITE_ACCESS_PIN=${{ secrets.VITE_ACCESS_PIN }}" >> .env
          echo "VITE_ALLOWED_IPS=${{ secrets.VITE_ALLOWED_IPS }}" >> .env

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
